server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Optional: protect admin pages with HTTP basic auth.
    # 1. On the server: htpasswd -c /etc/nginx/.htpasswd-admin your_user
    # 2. Mount the file into the container and uncomment the lines below.
    # location /admin/ {
    #     auth_basic "Ahnoud Cars Admin";
    #     auth_basic_user_file /etc/nginx/.htpasswd-admin;
    #     try_files $uri $uri/ =404;
    # }

    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    location ~* \.(js|jsx|css|svg|ico|woff2?|html)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
