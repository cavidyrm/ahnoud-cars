# Same as deploy/docker-compose.yml — kept in repo for reference.
# See ../deploy/static-site-template/README.md for the full static-site playbook.
services:
  app:
    image: ghcr.io/cavidyrm/ahnoud-cars:latest
    container_name: ahnoud-cars
    restart: unless-stopped
    ports:
      - "3003:80"
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.services.ahnoud-cars.loadbalancer.server.port=80"
      - "traefik.http.routers.ahnoud-cars.rule=Host(`ahnoudcars.com`) || Host(`www.ahnoudcars.com`)"
      - "traefik.http.routers.ahnoud-cars.entrypoints=websecure"
      - "traefik.http.routers.ahnoud-cars.tls=true"
      - "traefik.http.routers.ahnoud-cars.tls.certresolver=myresolver"
      - "traefik.http.routers.ahnoud-cars-http.rule=Host(`ahnoudcars.com`) || Host(`www.ahnoudcars.com`)"
      - "traefik.http.routers.ahnoud-cars-http.entrypoints=web"
      - "traefik.http.routers.ahnoud-cars-http.middlewares=ahnoud-cars-redirect-https"
      - "traefik.http.middlewares.ahnoud-cars-redirect-https.redirectscheme.scheme=https"

networks:
  traefik-public:
    external: true
